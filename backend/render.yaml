services:
  - type: web
    name: ai-support-backend
    env: python
    region: ohio
    buildCommand: "pip install -r requirements.txt"
    startCommand: "uvicorn app.main:app --host 0.0.0.0 --port $PORT"
    envVars:
      - key: PYTHON_VERSION
        value: 3.10.11
      - key: DATABASE_URL
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: CHROMA_DB_PATH
        value: /var/data/chroma
    disk:
      name: chroma-data
      mountPath: /var/data/chroma
      sizeGB: 1
